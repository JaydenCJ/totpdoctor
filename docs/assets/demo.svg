<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" font-family="Menlo, Consolas, 'DejaVu Sans Mono', monospace" font-size="14">
  <!-- Terminal transcript of a real run of `totpdoctor diagnose` against a
       code generated 90 seconds in the past, followed by `totpdoctor secret`
       on a mangled base32 secret. Text copied verbatim from an actual run. -->
  <rect width="920" height="520" rx="10" fill="#0d1117"/>
  <rect width="920" height="34" rx="10" fill="#161b22"/>
  <rect y="20" width="920" height="14" fill="#161b22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="17" r="6" fill="#febc2e"/>
  <circle cx="62" cy="17" r="6" fill="#28c840"/>
  <text x="460" y="22" fill="#8b949e" text-anchor="middle" font-size="12">totpdoctor — explain the mismatch, don't guess</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> totpdoctor diagnose --secret JBSWY3DPEHPK3PXP --code 314370 \</text>
    <text x="24" y="84">      --at 2026-07-12T12:00:00Z</text>
    <text x="24" y="112">observed 314370 | expected TOTP SHA1, 6 digits, 30s period | at 2026-07-12 12:00:00Z</text>
    <text x="24" y="140">verdict: <tspan fill="#7ee787">MATCH</tspan> — 1 explanation found (147 candidates tested, chance-collision risk 0.01%)</text>
    <text x="24" y="168">  1. <tspan fill="#d29922">clock skew: -90 s (-3 steps)</tspan></text>
    <text x="24" y="190">     The code is valid for 2026-07-12 11:58:30Z - 2026-07-12 11:59:00Z, i.e.</text>
    <text x="24" y="212">     the generating device's clock is about 90 seconds behind the verifier's.</text>
    <text x="24" y="234">     <tspan fill="#7ee787">fix:</tspan> Sync the generating device's clock via NTP; if skew persists, widen</text>
    <text x="24" y="256">     the server's accepted window or investigate the device's timezone/DST</text>
    <text x="24" y="278">     handling.</text>
    <text x="24" y="318"><tspan fill="#7ee787">$</tspan> totpdoctor secret 'jbsw 0ehk'</text>
    <text x="24" y="346">normalized: JBSW0EHK</text>
    <text x="24" y="368">decodes: <tspan fill="#f85149">no</tspan></text>
    <text x="24" y="390">issue [separators]: secret contains spaces or dashes (common when pasted in groups)</text>
    <text x="24" y="412">issue [lowercase]: secret contains lowercase letters; the RFC 4648 alphabet is uppercase</text>
    <text x="24" y="434">issue [non-alphabet]: character '0' is not in the base32 alphabet (A-Z, 2-7)</text>
    <text x="24" y="456">  hint: did you mean <tspan fill="#d29922">'O'</tspan>?</text>
    <text x="24" y="478">repair candidate: <tspan fill="#7ee787">JBSWOEHK</tspan></text>
  </g>
</svg>
